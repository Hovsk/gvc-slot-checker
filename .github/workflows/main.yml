name: GVC Slot Checker

on:
  schedule:
    # All times Yerevan (UTC+4), Mon-Fri only
    # 7:00-8:00 AM — every 5 min
    - cron: '*/5 3 * * 1-5'
    # 8:00-10:00 AM — every 3 min (most critical)
    - cron: '*/3 4-5 * * 1-5'
    # 10:00 AM-12:00 PM — every 5 min
    - cron: '*/5 6-7 * * 1-5'
    # 12:00-3:00 PM — every 10 min
    - cron: '*/10 8-10 * * 1-5'
    # 6:00-9:00 PM — every 15 min
    - cron: '*/15 14-16 * * 1-5'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Run in test mode?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force_slot:
        description: 'Simulate slot found? (tests full alert)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  check-slots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json

      - name: Check GVC slots
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GVC_SESSION:         ${{ secrets.GVC_SESSION }}
          GVC_AUTH_TOKEN:      ${{ secrets.GVC_AUTH_TOKEN }}
          GVC_COOKIE_SESSION:  ${{ secrets.GVC_COOKIE_SESSION }}
          TEST_MODE:        ${{ github.event.inputs.test_mode || 'false' }}
          FORCE_SLOT:       ${{ github.event.inputs.force_slot || 'false' }}
        run: php checker.php
