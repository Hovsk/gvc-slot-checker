name: GVC Slot Checker

on:
  schedule:
    # TEMPORARY TEST — every 5 min 15:30-16:30 Yerevan today (11:00-12:30 UTC)
    - cron: '*/5 11-12 * * *'
    # All times Yerevan (UTC+4), Mon-Fri only
    # 7:00 AM-12:00 PM — every 5 min (critical morning window)
    - cron: '*/5 3-7 * * 1-5'
    # 7:00 PM-3:00 AM — every 12 min (night watch, UTC 15:00-23:00)
    - cron: '*/12 15-23 * * 1-5'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Run in test mode?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force_slot:
        description: 'Simulate slot found? (tests full alert)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  check-slots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json

      - name: Check GVC slots
        env:
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GVC_SESSION:         ${{ secrets.GVC_SESSION }}
          GVC_AUTH_TOKEN:      ${{ secrets.GVC_AUTH_TOKEN }}
          GVC_COOKIE_SESSION:  ${{ secrets.GVC_COOKIE_SESSION }}
          TEST_MODE:           ${{ github.event.inputs.test_mode || 'false' }}
          FORCE_SLOT:          ${{ github.event.inputs.force_slot || 'false' }}
        run: php checker.php
