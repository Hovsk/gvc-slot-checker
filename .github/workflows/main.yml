name: GVC Slot Checker

on:
  schedule:
    - cron: '45-59/5 4 * * 1-5'
    - cron: '*/5 5-6 * * 1-5'
    - cron: '0 7 * * 1-5'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Run in test mode?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  check-slots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json

      - name: Check GVC slots
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GVC_SESSION:      ${{ secrets.GVC_SESSION }}
          TEST_MODE:        ${{ github.event.inputs.test_mode || 'false' }}
        run: php checker.php
